name: build and upload to cachix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [
          dopamine,
          dw-proton,
          gecit,
          iloader,
          jdownloader2,
          nero-umu,
          proton-cachyos,
          seanime,
          seanime.denshi,
          seanime-bin-canary,
          victus-control,
        ]
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: ern775-nixpkgs
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Build ${{ matrix.package }}
        run: nix build .#${{ matrix.package }} --print-build-logs

      - name: Push result to Cachix
        run: cachix push ern775-nixpkgs ./result